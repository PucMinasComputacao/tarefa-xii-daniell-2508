<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Filme - CineVerse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .detalhes-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            padding: 40px 0;
            color: white;
        }
        .poster-img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .info-filme {
            color: #333;
        }
        .info-filme h1 {
            color: #dc3545;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .info-filme p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .fotos-section {
            margin-top: 50px;
        }
        .fotos-section h2 {
            color: #dc3545;
            margin-bottom: 30px;
        }
        .error-message {
            text-align: center;
            padding: 40px;
            color: #dc3545;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                🎬 CineVerse
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#destaques">Destaques</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#catalogo">Filmes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#sobre">Sobre</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- DETALHES DO FILME -->
    <div id="detalhes-container" class="container mt-5">
        <p class="text-center">Carregando informações do filme...</p>
    </div>

    <!-- FOTOS DO FILME -->
    <section class="container fotos-section" id="fotos-section" style="display: none;">
        <h2>📸 Galeria de Imagens</h2>
        <div class="row" id="fotos-container"></div>
    </section>

    <!-- VOLTAR -->
    <div class="container mt-5 mb-5">
        <a href="index.html" class="btn btn-danger">← Voltar ao Catálogo</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/dados.js"></script>
    <script src="assets/js/app.js"></script>

</html>
